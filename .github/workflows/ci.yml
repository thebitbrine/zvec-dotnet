name: CI

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

env:
  ZVEC_VERSION: '0.4.0'

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: ubuntu-latest
            rid: linux-x64
          - os: macos-14
            rid: osx-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Download native binaries from PyPI
        shell: python
        run: |
          import subprocess, shutil, os, glob

          rid = "${{ matrix.rid }}"
          dest = os.path.join("runtimes", rid, "native")
          os.makedirs(dest, exist_ok=True)

          tmp = os.path.join(os.environ.get("RUNNER_TEMP", "/tmp"), "zvec_pkg")
          subprocess.check_call(["pip", "install", "--no-deps", "--target", tmp, "zvec==${{ env.ZVEC_VERSION }}"])

          # Copy all native libs (dll, so, dylib)
          for ext in ("*.dll", "*.so", "*.so.*", "*.dylib"):
              for root, dirs, files in os.walk(tmp):
                  import fnmatch
                  for f in files:
                      if fnmatch.fnmatch(f, ext):
                          src = os.path.join(root, f)
                          shutil.copy2(src, dest)
                          print(f"Copied: {src} -> {dest}/{f}")

          print(f"\nContents of {dest}:")
          for f in os.listdir(dest):
              size = os.path.getsize(os.path.join(dest, f))
              print(f"  {f} ({size // 1024 // 1024} MB)")

      - name: Build
        run: dotnet build --configuration Release

      - name: Test
        run: dotnet test --configuration Release --verbosity minimal --filter "FullyQualifiedName!~LargeScale"

  pack:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Download native binaries for all platforms
        shell: python
        run: |
          import subprocess, shutil, os, fnmatch

          platforms = {
              "win_amd64": "win-x64",
              "manylinux_2_28_x86_64": "linux-x64",
              "macosx_11_0_arm64": "osx-arm64",
          }

          for pyplat, rid in platforms.items():
              dest = os.path.join("runtimes", rid, "native")
              os.makedirs(dest, exist_ok=True)
              tmp = os.path.join(os.environ.get("RUNNER_TEMP", "/tmp"), f"zvec_{rid}")
              subprocess.check_call([
                  "pip", "install", "--no-deps", "--target", tmp,
                  "--platform", pyplat, "--python-version", "3.12",
                  "--only-binary", ":all:", "zvec==${{ env.ZVEC_VERSION }}"
              ])
              for root, dirs, files in os.walk(tmp):
                  for f in files:
                      if any(fnmatch.fnmatch(f, p) for p in ("*.dll", "*.so", "*.so.*", "*.dylib")):
                          shutil.copy2(os.path.join(root, f), dest)
                          print(f"  {rid}: {f}")

      - name: Pack
        run: dotnet pack src/Zvec/Zvec.csproj --configuration Release --output ./nupkg

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuget-package
          path: ./nupkg/*.*nupkg

      - name: Push to NuGet
        run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
