name: CI

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-native:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
            rid: win-x64
            script: powershell -File native/build-native.ps1 -Tag v0.5.1
          - os: ubuntu-latest
            rid: linux-x64
            script: bash native/build-native.sh v0.5.1
          - os: macos-14
            rid: osx-arm64
            script: bash native/build-native.sh v0.5.1

    runs-on: ${{ matrix.os }}
    timeout-minutes: 240

    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            sudo apt-get update && sudo apt-get install -y cmake build-essential
          fi

      - name: Build zvec native library
        run: ${{ matrix.script }}
        timeout-minutes: 60

      - name: Upload native binary
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.rid }}
          path: runtimes/${{ matrix.rid }}/native/
          retention-days: 7

  build-and-test:
    needs: build-native
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
            rid: win-x64
          - os: ubuntu-latest
            rid: linux-x64
          - os: macos-14
            rid: osx-arm64

    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Download native binary
        uses: actions/download-artifact@v4
        with:
          name: native-${{ matrix.rid }}
          path: runtimes/${{ matrix.rid }}/native/

      - name: Build
        run: dotnet build --configuration Release

      - name: Test
        run: dotnet test --configuration Release --verbosity minimal --filter "FullyQualifiedName!~LargeScale"

  pack-and-release:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Download all native binaries
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Arrange runtimes for NuGet
        shell: bash
        run: |
          for rid in win-x64 linux-x64 osx-arm64; do
            mkdir -p "runtimes/$rid/native"
            if [ -d "artifacts/native-$rid" ]; then
              cp artifacts/native-$rid/* "runtimes/$rid/native/"
            fi
          done
          echo "Runtimes:"
          find runtimes -type f -exec ls -lh {} \;

      - name: Pack NuGet
        run: dotnet pack src/Zvec/Zvec.csproj --configuration Release --output ./nupkg

      - name: Upload NuGet artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuget-package
          path: ./nupkg/*.*nupkg

      - name: Push to NuGet
        run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Create platform archives
        shell: bash
        run: |
          mkdir -p release-archives
          for rid in win-x64 linux-x64 osx-arm64; do
            if [ -d "artifacts/native-$rid" ]; then
              cd "artifacts/native-$rid"
              zip ../../release-archives/zvec-native-$rid.zip *
              cd ../..
            fi
          done

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-archives/*.zip
            nupkg/*.nupkg
            nupkg/*.snupkg
