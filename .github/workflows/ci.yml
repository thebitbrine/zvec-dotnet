name: CI

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

env:
  ZVEC_BRANCH: 'main'

jobs:
  build-native:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            script: powershell -File native/build-native.ps1 -Tag main
          - os: ubuntu-latest
            rid: linux-x64
            script: bash native/build-native.sh main
          - os: macos-14
            rid: osx-arm64
            script: bash native/build-native.sh main

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            sudo apt-get update && sudo apt-get install -y cmake build-essential
          fi

      - name: Build zvec native library
        run: ${{ matrix.script }}

      - name: Upload native binary
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.rid }}
          path: runtimes/${{ matrix.rid }}/native/

  build-and-test:
    needs: build-native
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: ubuntu-latest
            rid: linux-x64
          - os: macos-14
            rid: osx-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Download native binary
        uses: actions/download-artifact@v4
        with:
          name: native-${{ matrix.rid }}
          path: runtimes/${{ matrix.rid }}/native/

      - name: Build
        run: dotnet build --configuration Release

      - name: Test
        run: dotnet test --configuration Release --verbosity minimal --filter "FullyQualifiedName!~LargeScale"

  pack:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Download all native binaries
        uses: actions/download-artifact@v4
        with:
          pattern: native-*
          path: runtimes/
          merge-multiple: false

      - name: Arrange runtimes
        shell: bash
        run: |
          # download-artifact creates native-win-x64/, native-linux-x64/, native-osx-arm64/
          # We need runtimes/win-x64/native/, etc.
          for dir in runtimes/native-*/; do
            rid=$(basename "$dir" | sed 's/^native-//')
            mkdir -p "runtimes/$rid/native"
            cp "$dir"/* "runtimes/$rid/native/" 2>/dev/null || true
          done
          find runtimes -type f | head -20

      - name: Pack
        run: dotnet pack src/Zvec/Zvec.csproj --configuration Release --output ./nupkg

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuget-package
          path: ./nupkg/*.*nupkg

      - name: Push to NuGet
        run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
