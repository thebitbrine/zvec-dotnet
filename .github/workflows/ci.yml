name: CI

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Download native binaries from PyPI
        shell: pwsh
        run: |
          pip install --no-deps --target "$env:TEMP\zvec_pkg" zvec==0.4.0
          New-Item -ItemType Directory -Force -Path "runtimes\win-x64\native" | Out-Null
          Copy-Item "$env:TEMP\zvec_pkg\bin\*.dll" "runtimes\win-x64\native\" -Force
          Get-ChildItem "runtimes\win-x64\native"

      - name: Build
        run: dotnet build --configuration Release

      - name: Test
        run: dotnet test --configuration Release --verbosity minimal --filter "FullyQualifiedName!~LargeScale"

  pack:
    needs: build-and-test
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Download native binaries
        shell: pwsh
        run: |
          pip install --no-deps --target "$env:TEMP\zvec_pkg" zvec==0.4.0
          New-Item -ItemType Directory -Force -Path "runtimes\win-x64\native" | Out-Null
          Copy-Item "$env:TEMP\zvec_pkg\bin\*.dll" "runtimes\win-x64\native\" -Force

      - name: Pack
        run: dotnet pack src/Zvec/Zvec.csproj --configuration Release --output ./nupkg

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuget-package
          path: ./nupkg/*.nupkg

      - name: Push to NuGet
        run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
